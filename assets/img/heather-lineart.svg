<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" aria-hidden="true">
  <!-- Heather lineart — elegant botanical line drawing -->
  <g stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.15">
    <!-- Main stem -->
    <path d="M100,195 C100,170 98,140 102,110 C104,85 100,55 105,30"/>
    <!-- Side branch 1 (lower) -->
    <path d="M101,150 C90,145 75,140 60,135"/>
    <!-- Side branch 2 -->
    <path d="M102,120 C115,115 130,110 145,105"/>
    <!-- Side branch 3 -->
    <path d="M101,90 C88,85 72,80 58,75"/>
    <!-- Side branch 4 (upper) -->
    <path d="M103,60 C116,55 131,50 146,45"/>
    <!-- Small flower clusters — bell-shaped heather blooms -->
    <!-- Cluster on main stem top -->
    <path d="M105,30 C103,25 107,22 105,18 C103,14 107,11 105,7"/>
    <ellipse cx="105" cy="28" rx="2.5" ry="4" transform="rotate(10 105 28)"/>
    <ellipse cx="103" cy="22" rx="2.5" ry="4" transform="rotate(-5 103 22)"/>
    <ellipse cx="107" cy="16" rx="2.5" ry="4" transform="rotate(15 107 16)"/>
    <ellipse cx="104" cy="10" rx="2" ry="3.5" transform="rotate(-10 104 10)"/>
    <!-- Cluster on branch 1 -->
    <ellipse cx="60" cy="135" rx="2.5" ry="4" transform="rotate(-20 60 135)"/>
    <ellipse cx="55" cy="130" rx="2.5" ry="4" transform="rotate(-30 55 130)"/>
    <ellipse cx="52" cy="125" rx="2" ry="3.5" transform="rotate(-40 52 125)"/>
    <!-- Cluster on branch 2 -->
    <ellipse cx="145" cy="105" rx="2.5" ry="4" transform="rotate(20 145 105)"/>
    <ellipse cx="150" cy="100" rx="2.5" ry="4" transform="rotate(30 150 100)"/>
    <ellipse cx="153" cy="95" rx="2" ry="3.5" transform="rotate(40 153 95)"/>
    <!-- Cluster on branch 3 -->
    <ellipse cx="58" cy="75" rx="2.5" ry="4" transform="rotate(-25 58 75)"/>
    <ellipse cx="53" cy="70" rx="2" ry="3.5" transform="rotate(-35 53 70)"/>
    <!-- Cluster on branch 4 -->
    <ellipse cx="146" cy="45" rx="2.5" ry="4" transform="rotate(25 146 45)"/>
    <ellipse cx="151" cy="40" rx="2" ry="3.5" transform="rotate(35 151 40)"/>
    <!-- Small leaves along stem -->
    <path d="M100,160 C96,158 93,159 92,162 C95,163 99,162 100,160"/>
    <path d="M102,130 C106,128 109,129 110,132 C107,133 103,132 102,130"/>
    <path d="M100,100 C96,98 93,99 92,102 C95,103 99,102 100,100"/>
    <path d="M103,70 C107,68 110,69 111,72 C108,73 104,72 103,70"/>
    <!-- Tiny secondary stems with buds -->
    <path d="M101,45 C97,42 94,43 93,46"/>
    <ellipse cx="93" cy="46" rx="1.5" ry="2.5" transform="rotate(-30 93 46)"/>
    <path d="M104,40 C108,37 111,38 112,41"/>
    <ellipse cx="112" cy="41" rx="1.5" ry="2.5" transform="rotate(30 112 41)"/>
  </g>
</svg>